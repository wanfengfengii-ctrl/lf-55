{% extends "base.html" %}
{% block title %}排班方案 - 古城门启闭排班系统{% endblock %}
{% block content %}
<div class="page-header">
    <h1>排班方案</h1>
</div>

<div class="card">
    <h2>生成排班</h2>
    <div class="form-grid" style="grid-template-columns: 250px auto;">
        <div class="form-group">
            <label>起始日期（生成一周）</label>
            <input type="date" id="startDate" value="{{ start_date }}">
        </div>
        <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn btn-primary" onclick="generateSchedules()">生成排班方案</button>
        </div>
    </div>
</div>

<div id="conflictPanel" class="card" style="display:none;">
    <h2 style="color:var(--accent-red);">规则冲突提示</h2>
    <div id="conflictList"></div>
</div>

<div class="card">
    <h2>每日启闭时间表</h2>
    <div class="scheme-tabs">
        <button class="scheme-tab active" data-scheme="final" onclick="switchScheme('final', this)">最终方案</button>
        <button class="scheme-tab" data-scheme="regular" onclick="switchScheme('regular', this)">常规规则</button>
        <button class="scheme-tab" data-scheme="festival" onclick="switchScheme('festival', this)">节庆延迟</button>
        <button class="scheme-tab" data-scheme="alert" onclick="switchScheme('alert', this)">警戒关闭</button>
    </div>
    <div class="table-responsive">
        <table id="scheduleTable">
            <thead>
                <tr id="scheduleHeader"></tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
        </table>
    </div>
</div>

<div id="ruleChainPanel" class="card" style="display:none;">
    <h2>规则来源链 & 覆盖信息</h2>
    <div id="ruleChainDetail"></div>
</div>

<div class="card">
    <h2>一周启闭趋势</h2>
    <div id="weeklyChart" style="min-height:450px;"></div>
</div>

<div class="card">
    <h2>方案对比</h2>
    <div class="form-grid" style="grid-template-columns: 250px auto;">
        <div class="form-group">
            <label>选择城门</label>
            <select id="comparisonGateSelect" onchange="renderComparisonChart()">
            </select>
        </div>
    </div>
    <div id="comparisonChart" style="min-height:400px;"></div>
</div>

<div class="card">
    <h2>冲突预演</h2>
    <div class="form-grid" style="grid-template-columns: 200px 200px auto;">
        <div class="form-group">
            <label>开始日期</label>
            <input type="date" id="previewStartDate">
        </div>
        <div class="form-group">
            <label>结束日期</label>
            <input type="date" id="previewEndDate">
        </div>
        <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn btn-primary" onclick="runConflictPreview()">冲突预演</button>
        </div>
    </div>
    <div id="conflictPreviewResult" style="margin-top:1rem;"></div>
</div>

<div class="card">
    <h2>批量发布模拟</h2>
    <div class="form-grid" style="grid-template-columns: 200px 200px auto;">
        <div class="form-group">
            <label>开始日期</label>
            <input type="date" id="simStartDate">
        </div>
        <div class="form-group">
            <label>结束日期</label>
            <input type="date" id="simEndDate">
        </div>
        <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn btn-success" onclick="runBatchSimulation()">模拟发布</button>
        </div>
    </div>
    <div id="batchSimResult" style="margin-top:1rem;"></div>
</div>

<div class="card">
    <h2>联动策略趋势对比</h2>
    <div class="form-grid" style="grid-template-columns: 200px 200px auto;">
        <div class="form-group">
            <label>起始日期</label>
            <input type="date" id="linkageStartDate">
        </div>
        <div class="form-group">
            <label>联动策略</label>
            <select id="linkageStrategySelect">
                <option value="">--选择策略--</option>
            </select>
        </div>
        <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn btn-primary" onclick="runLinkageComparison()">趋势对比</button>
        </div>
    </div>
    <div id="linkageComparisonChart" style="margin-top:1rem;min-height:400px;"></div>
</div>

<div class="card">
    <h2>发布排班</h2>
    <div class="form-grid" style="grid-template-columns: 250px auto;">
        <div class="form-group">
            <label>选择日期</label>
            <input type="date" id="publishDate">
        </div>
        <div class="form-group">
            <label>&nbsp;</label>
            <button type="button" class="btn btn-success" onclick="publishSchedule()">发布排班</button>
            <button type="button" class="btn btn-primary" style="margin-left:0.5rem;" onclick="checkPublish()">检查冲突</button>
        </div>
    </div>
    <div id="publishResult" style="margin-top:1rem;"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentScheme = 'final';
let scheduleData = null;
let chartData = null;
let currentComparisonGateIndex = 0;

function switchScheme(scheme, btn) {
    currentScheme = scheme;
    document.querySelectorAll('.scheme-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderScheduleTable();
}

async function generateSchedules() {
    const startDate = document.getElementById('startDate').value;
    if (!startDate) {
        showToast('请选择起始日期', 'error');
        return;
    }
    try {
        const resp = await fetch(`/api/schedules/generate?start_date=${startDate}`);
        scheduleData = await resp.json();
        renderScheduleTable();
        renderConflicts();
        await loadChartData(startDate);
        await loadLinkageStrategies();
        showToast('排班方案已生成', 'success');
    } catch (e) {
        showToast('生成失败: ' + e.message, 'error');
    }
}

function renderScheduleTable() {
    if (!scheduleData || scheduleData.length === 0) {
        document.getElementById('scheduleHeader').innerHTML = '';
        document.getElementById('scheduleBody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-secondary);">请先生成排班方案</td></tr>';
        return;
    }

    const dates = [...new Set(scheduleData.map(s => s.date))].sort();
    const gates = [...new Map(scheduleData.map(s => [s.gate_name, s.gate_id])).entries()];

    let headerHtml = '<th>城门</th>';
    dates.forEach(d => {
        const dayName = new Date(d + 'T00:00:00').toLocaleDateString('zh-CN', { weekday: 'short' });
        headerHtml += `<th>${d.slice(5)}<br><small>${dayName}</small></th>`;
    });
    document.getElementById('scheduleHeader').innerHTML = headerHtml;

    let bodyHtml = '';
    gates.forEach(([gateName, gateId]) => {
        bodyHtml += `<tr><td><strong>${gateName}</strong></td>`;
        dates.forEach(d => {
            const item = scheduleData.find(s => s.gate_id === gateId && s.date === d);
            if (item) {
                let schemeData = null;
                if (currentScheme === 'final' && item.final) schemeData = item.final;
                else if (currentScheme === 'regular') schemeData = item.regular;
                else if (currentScheme === 'festival' && item.festival) schemeData = item.festival;
                else if (currentScheme === 'alert' && item.alert) schemeData = item.alert;
                else if (currentScheme === 'festival' || currentScheme === 'alert') schemeData = item.regular;

                if (schemeData) {
                    const hasConflict = item.has_conflict && currentScheme === 'final';
                    const hasOverride = item.override_reason && currentScheme === 'final';
                    const hasLinkage = item.linkage_scope && item.linkage_scope.length > 0 && currentScheme === 'final';
                    let styleStr = '';
                    if (hasConflict) styleStr = 'background:rgba(192,57,43,0.1);';
                    else if (hasOverride) styleStr = 'background:rgba(230,126,34,0.1);';
                    else if (hasLinkage) styleStr = 'background:rgba(41,128,185,0.1);';

                    const indicator = hasConflict ? '<span class="conflict-indicator error" title="冲突"></span>'
                        : hasOverride ? '<span class="conflict-indicator warn" title="管制覆盖"></span>'
                        : hasLinkage ? '<span class="conflict-indicator info" title="联动影响"></span>'
                        : '<span class="conflict-indicator ok"></span>';

                    const extra = [];
                    if (hasOverride) extra.push(`<br><small style="color:var(--accent-orange);">🔒${item.override_reason.slice(0, 15)}…</small>`);
                    if (hasLinkage) extra.push(`<br><small style="color:var(--accent-blue);">🔗${item.linkage_scope.join('、')}</small>`);

                    bodyHtml += `<td style="${styleStr}">${indicator}${schemeData.open} - ${schemeData.close}${extra.join('')}</td>`;
                } else {
                    bodyHtml += '<td>-</td>';
                }
            } else {
                bodyHtml += '<td>-</td>';
            }
        });
        bodyHtml += '</tr>';
    });
    document.getElementById('scheduleBody').innerHTML = bodyHtml;

    const anyHasChain = scheduleData.some(s => s.rule_chain && s.rule_chain.length > 0);
    if (anyHasChain) {
        document.getElementById('ruleChainPanel').style.display = '';
        renderRuleChainDetail();
    } else {
        document.getElementById('ruleChainPanel').style.display = 'none';
    }
}

function renderRuleChainDetail() {
    if (!scheduleData) return;
    const finalItems = scheduleData.filter(s => s.rule_chain && s.rule_chain.length > 0);
    if (!finalItems.length) {
        document.getElementById('ruleChainDetail').innerHTML = '<p style="color:var(--text-secondary);">无规则来源链</p>';
        return;
    }
    let html = '<div class="rule-chain-list">';
    finalItems.forEach(item => {
        html += `<div class="rule-chain-item">`;
        html += `<div class="rule-chain-header"><strong>${item.gate_name}</strong> (${item.date})`;
        if (item.override_reason) html += ` <span class="badge badge-orange">覆盖: ${item.override_reason}</span>`;
        if (item.linkage_scope && item.linkage_scope.length) html += ` <span class="badge badge-blue">联动: ${item.linkage_scope.join('、')}</span>`;
        html += `</div>`;
        html += `<div class="rule-chain-steps">`;
        item.rule_chain.forEach((step, idx) => {
            const isLast = idx === item.rule_chain.length - 1;
            const sourceClass = step.source === '临时管制令' ? 'badge-red'
                : step.source === '多城门联动' ? 'badge-blue'
                : step.source === '宵禁' ? 'badge-purple'
                : step.source === '警戒' ? 'badge-orange'
                : step.source === '节庆' ? 'badge-gold'
                : 'badge-green';
            html += `<span class="badge ${sourceClass}">${step.source}</span>`;
            html += `<span style="color:var(--text-secondary);margin:0 0.25rem;">→</span>`;
            html += `<span style="color:var(--text-primary);font-size:0.85rem;">${step.detail}</span>`;
            if (!isLast) html += `<br>`;
        });
        html += `</div></div>`;
    });
    html += '</div>';
    document.getElementById('ruleChainDetail').innerHTML = html;
}

function renderConflicts() {
    if (!scheduleData) return;
    const conflicts = scheduleData.filter(s => s.has_conflict);
    const panel = document.getElementById('conflictPanel');
    const list = document.getElementById('conflictList');
    if (conflicts.length === 0) {
        panel.style.display = 'none';
        return;
    }
    panel.style.display = 'block';
    let html = '';
    conflicts.forEach(c => {
        html += `<div class="alert alert-danger" style="margin-bottom:0.5rem;">
            <strong>${c.gate_name} (${c.date})</strong>: ${c.conflicts.join('；')}
        </div>`;
    });
    list.innerHTML = html;
}

async function loadChartData(startDate) {
    try {
        const resp = await fetch(`/api/schedules/chart-data?start_date=${startDate}`);
        chartData = await resp.json();
        
        const sel = document.getElementById('comparisonGateSelect');
        sel.innerHTML = '';
        chartData.gates.forEach((gate, idx) => {
            sel.innerHTML += `<option value="${idx}">${gate.gate_name} (${gate.gate_code})</option>`;
        });
        sel.value = '0';
        
        renderWeeklyChart();
        renderComparisonChart();
    } catch (e) {
        console.error('Chart data error:', e);
    }
}

function renderWeeklyChart() {
    if (!chartData || !chartData.gates.length) return;
    const traces = [];
    const colors = {
        regular: { open: '#e67e22', close: '#9b59b6' },
        final: { open: '#c9a84c', close: '#c0392b' }
    };

    chartData.gates.forEach(gate => {
        traces.push({
            x: chartData.dates.map(d => d.slice(5)),
            y: gate.final.open,
            name: `${gate.gate_name} 开门`,
            type: 'scatter',
            mode: 'lines+markers',
            line: { color: colors.final.open, width: 2 },
            marker: { size: 6 }
        });
        traces.push({
            x: chartData.dates.map(d => d.slice(5)),
            y: gate.final.close,
            name: `${gate.gate_name} 关门`,
            type: 'scatter',
            mode: 'lines+markers',
            line: { color: colors.final.close, width: 2 },
            marker: { size: 6 }
        });
    });

    const layout = {
        title: { text: '一周启闭趋势（最终方案）', font: { color: '#c9a84c', size: 16 } },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        font: { color: '#a89b8c' },
        xaxis: { title: '日期', gridcolor: '#2c3e6b' },
        yaxis: {
            title: '时间',
            gridcolor: '#2c3e6b',
            tickvals: [240, 300, 360, 420, 480, 540, 600, 660, 720, 780, 840, 900, 960, 1020, 1080, 1140, 1200],
            ticktext: ['04:00','05:00','06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00']
        },
        legend: { orientation: 'h', y: -0.2 },
        margin: { l: 60, r: 30, t: 40, b: 80 },
        height: 420
    };

    Plotly.newPlot('weeklyChart', traces, layout, { responsive: true });
}

function renderComparisonChart() {
    if (!chartData || !chartData.gates.length) return;
    const sel = document.getElementById('comparisonGateSelect');
    if (sel) {
        currentComparisonGateIndex = parseInt(sel.value) || 0;
    }
    const traces = [];
    const schemeColors = {
        regular: '#27ae60',
        festival: '#e67e22',
        alert: '#c0392b',
        final: '#c9a84c'
    };

    const gate = chartData.gates[currentComparisonGateIndex];
    const schemes = ['regular', 'festival', 'alert', 'final'];

    schemes.forEach(scheme => {
        const openData = gate[scheme].open;
        const closeData = gate[scheme].close;
        if (openData.some(v => v !== null)) {
            traces.push({
                x: chartData.dates.map(d => d.slice(5)),
                y: closeData,
                name: `${scheme === 'regular' ? '常规' : scheme === 'festival' ? '节庆' : scheme === 'alert' ? '警戒' : '最终'}关门`,
                type: 'bar',
                marker: { color: schemeColors[scheme], opacity: 0.7 }
            });
        }
    });

    const layout = {
        title: { text: `方案对比 - ${gate.gate_name}`, font: { color: '#c9a84c', size: 16 } },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        font: { color: '#a89b8c' },
        barmode: 'group',
        xaxis: { title: '日期', gridcolor: '#2c3e6b' },
        yaxis: {
            title: '关门时间(分钟)',
            gridcolor: '#2c3e6b',
            tickvals: [720, 780, 840, 900, 960, 1020, 1080, 1140, 1200, 1260],
            ticktext: ['12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00']
        },
        legend: { orientation: 'h', y: -0.25 },
        margin: { l: 60, r: 30, t: 40, b: 80 },
        height: 380
    };

    Plotly.newPlot('comparisonChart', traces, layout, { responsive: true });
}

async function runConflictPreview() {
    const startDate = document.getElementById('previewStartDate').value;
    const endDate = document.getElementById('previewEndDate').value;
    if (!startDate || !endDate) {
        showToast('请选择日期范围', 'error');
        return;
    }
    try {
        const resp = await fetch(`/api/schedules/conflict-preview?start_date=${startDate}&end_date=${endDate}`);
        const result = await resp.json();
        const el = document.getElementById('conflictPreviewResult');
        if (result.total_conflicts === 0) {
            el.innerHTML = '<div class="alert alert-success">该日期范围内无冲突。</div>';
        } else {
            let html = `<div class="alert alert-warning">发现 ${result.total_conflicts} 处冲突：</div>`;
            result.conflicts.forEach(c => {
                let tags = '';
                if (c.override_reason) tags += ` <span class="badge badge-orange">管制覆盖</span>`;
                if (c.linkage_scope && c.linkage_scope.length) tags += ` <span class="badge badge-blue">联动: ${c.linkage_scope.join('、')}</span>`;
                html += `<div class="alert alert-danger" style="margin-bottom:0.5rem;"><strong>${c.gate_name} (${c.date})</strong>${tags}: ${c.conflicts.join('；')}</div>`;
            });
            el.innerHTML = html;
        }
    } catch (e) {
        showToast('冲突预演失败', 'error');
    }
}

async function runBatchSimulation() {
    const startDate = document.getElementById('simStartDate').value;
    const endDate = document.getElementById('simEndDate').value;
    if (!startDate || !endDate) {
        showToast('请选择日期范围', 'error');
        return;
    }
    try {
        const resp = await fetch(`/api/schedules/batch-simulate?start_date=${startDate}&end_date=${endDate}`);
        const result = await resp.json();
        const el = document.getElementById('batchSimResult');
        const sim = result.simulation;
        const summary = result.summary;

        let html = `<div class="stats-grid" style="margin-bottom:1rem;">
            <div class="stat-card"><div class="stat-value">${summary.total_days}</div><div class="stat-label">总天数</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--accent-green);">${summary.publishable_days}</div><div class="stat-label">可发布天数</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--accent-red);">${summary.blocked_days}</div><div class="stat-label">冲突天数</div></div>
        </div>`;

        sim.forEach(day => {
            const statusBadge = day.can_publish
                ? '<span class="badge badge-green">可发布</span>'
                : '<span class="badge badge-red">有冲突</span>';
            html += `<div class="sim-day" style="padding:0.75rem;border:1px solid var(--border-color);border-radius:var(--radius);margin-bottom:0.5rem;">`;
            html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;"><strong>${day.date}</strong>${statusBadge}</div>`;
            html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.5rem;">`;
            day.gates.forEach(g => {
                const gStatus = g.can_publish ? 'color:var(--accent-green);' : 'color:var(--accent-red);';
                html += `<div style="font-size:0.85rem;${gStatus}">${g.gate_name}: ${g.open}-${g.close}`;
                if (!g.can_publish && g.conflicts.length) html += ` <small>(${g.conflicts.join('; ')})</small>`;
                if (g.override_reason) html += ` <span class="badge badge-orange" style="font-size:0.7rem;">管制</span>`;
                html += `</div>`;
            });
            html += '</div></div>';
        });
        el.innerHTML = html;
    } catch (e) {
        showToast('模拟失败', 'error');
    }
}

async function loadLinkageStrategies() {
    try {
        const resp = await fetch('/linkage-strategies');
        const sel = document.getElementById('linkageStrategySelect');
        sel.innerHTML = '<option value="">--选择策略--</option>';
        const resp2 = await fetch('/api/linkage/strategies-list');
        if (resp2.ok) {
            const strategies = await resp2.json();
            strategies.forEach(s => {
                sel.innerHTML += `<option value="${s.id}">${s.strategy_name}${s.is_active ? ' (生效中)' : ' (已停用)'}</option>`;
            });
        }
    } catch (e) {
        console.error('Load strategies error:', e);
    }
}

async function runLinkageComparison() {
    const startDate = document.getElementById('linkageStartDate').value;
    const strategyId = document.getElementById('linkageStrategySelect').value;
    if (!startDate || !strategyId) {
        showToast('请选择起始日期和联动策略', 'error');
        return;
    }
    try {
        const resp = await fetch(`/api/linkage/weekly-comparison?start_date=${startDate}&strategy_id=${strategyId}`);
        const result = await resp.json();
        if (result.error) {
            showToast(result.error, 'error');
            return;
        }
        renderLinkageComparisonChart(result);
    } catch (e) {
        showToast('趋势对比失败', 'error');
    }
}

function renderLinkageComparisonChart(data) {
    const traces = [];
    const withColor = '#c9a84c';
    const withoutColor = '#7f8c8d';

    data.with_linkage.gates.forEach(gate => {
        traces.push({
            x: data.with_linkage.dates.map(d => d.slice(5)),
            y: gate.close,
            name: `${gate.gate_name} 联动后关门`,
            type: 'scatter',
            mode: 'lines+markers',
            line: { color: withColor, width: 2 },
            marker: { size: 6 }
        });
    });

    data.without_linkage.gates.forEach(gate => {
        traces.push({
            x: data.without_linkage.dates.map(d => d.slice(5)),
            y: gate.close,
            name: `${gate.gate_name} 无联动关门`,
            type: 'scatter',
            mode: 'lines+markers',
            line: { color: withoutColor, width: 2, dash: 'dash' },
            marker: { size: 5 }
        });
    });

    const layout = {
        title: { text: `联动策略趋势对比 - ${data.strategy_name}`, font: { color: '#c9a84c', size: 16 } },
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        font: { color: '#a89b8c' },
        xaxis: { title: '日期', gridcolor: '#2c3e6b' },
        yaxis: {
            title: '关门时间',
            gridcolor: '#2c3e6b',
            tickvals: [720, 780, 840, 900, 960, 1020, 1080, 1140, 1200, 1260, 1320],
            ticktext: ['12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00']
        },
        legend: { orientation: 'h', y: -0.25 },
        margin: { l: 60, r: 30, t: 40, b: 80 },
        height: 400
    };

    Plotly.newPlot('linkageComparisonChart', traces, layout, { responsive: true });
}

async function checkPublish() {
    const dateStr = document.getElementById('publishDate').value;
    if (!dateStr) {
        showToast('请选择日期', 'error');
        return;
    }
    try {
        const resp = await fetch(`/api/schedules/check-publish?date_str=${dateStr}`);
        const result = await resp.json();
        const el = document.getElementById('publishResult');
        if (result.can_publish) {
            el.innerHTML = '<div class="alert alert-success">该日期排班无冲突，可以发布。</div>';
        } else {
            let html = '<div class="alert alert-danger"><strong>存在冲突，无法发布：</strong><ul>';
            result.reasons.forEach(r => { html += `<li>${r}</li>`; });
            html += '</ul></div>';
            el.innerHTML = html;
        }
    } catch (e) {
        showToast('检查失败', 'error');
    }
}

async function publishSchedule() {
    const dateStr = document.getElementById('publishDate').value;
    if (!dateStr) {
        showToast('请选择日期', 'error');
        return;
    }
    try {
        const resp = await fetch(`/api/schedules/publish?date_str=${dateStr}`, { method: 'POST' });
        const result = await resp.json();
        if (result.success) {
            showToast('排班发布成功！', 'success');
            document.getElementById('publishResult').innerHTML = '<div class="alert alert-success">排班已成功发布！</div>';
        } else {
            showToast('发布失败', 'error');
            let html = '<div class="alert alert-danger"><strong>发布失败：</strong><ul>';
            result.errors.forEach(r => { html += `<li>${r}</li>`; });
            html += '</ul></div>';
            document.getElementById('publishResult').innerHTML = html;
        }
    } catch (e) {
        showToast('发布失败: ' + e.message, 'error');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    generateSchedules();
});
</script>
{% endblock %}
